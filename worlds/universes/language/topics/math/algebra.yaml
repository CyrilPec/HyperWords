metadata:
  category: Mathematics
  level: Beginner
  language: en
  
description: "Algebra is a branch of mathematics that uses symbols (like letters) and numbers to find unknown values and understand relationships between quantities."

applications:
  - "Physics calculations (motion, force)"
  - "Finance (interest, profit, loss)"
  - "Engineering and computer science"
  - "Everyday problem solving"

topics:
  - Linear Equations
  - Quadratic Equations
  - Polynomials
  - Inequalities
  - Systems of Equations

concepts:
  - variable: "A symbol (like x or y) representing an unknown value"
  - constant: "A fixed number"
  - coefficient: "A number multiplied by a variable (e.g., 2 in 2x)"
  - expression: "A combination of numbers, variables, and operations"
  - equation: "A statement that two expressions are equal"

examples:
  - expression: "x + 5 = 12"
    solution: "x = 7"
  - expression: "2x = 10"
    solution: "x = 5"
    
attributes:
  - name: Commutative Property
    description: Changing the order doesn’t change the result.
    examples:
      - "a + b = b + a"
      - "a × b = b × a"

  - name: Associative Property
    description: Changing the grouping doesn’t change the result.
    examples:
      - "(a + b) + c = a + (b + c)"
      - "(a × b) × c = a × (b × c)"

  - name: Distributive Property
    description: Multiplication distributes over addition or subtraction.
    examples:
      - "a(b + c) = ab + ac"

  - name: Identity Property
    description: Special numbers that do not change a value.
    examples:
      - "a + 0 = a"
      - "a × 1 = a"

  - name: Inverse Property
    description: Every number has an opposite that cancels it out.
    examples:
      - "a + (−a) = 0"
      - "a × (1/a) = 1 (a ≠ 0)"

  - name: Equality Property
    description: If two expressions are equal, the same operation can be applied to both.
    examples:
      - "If a = b, then a + c = b + c"
  
methods:
  - name: Substitution Method
    description: You replace a variable with its value or another expression.
    example: "If x = 3, then in 2x + 1 → 2(3) + 1 = 7"

  - name: Elimination Method
    description: Used mostly with systems of equations. You add or subtract equations to eliminate one variable.

  - name: Balancing Method
    description: Whatever you do to one side of an equation, you do to the other to keep it equal.
    example: "x + 5 = 10 → subtract 5 from both sides → x = 5"

  - name: Factoring Method
    description: You break expressions into simpler parts (factors).
    example: "x² + 5x = x(x + 5)"

  - name: Expansion Method
    description: Opposite of factoring—multiply out brackets.
    example: "(x + 2)(x + 3) = x² + 5x + 6"

  - name: Graphical Method
    description: You draw graphs to find solutions (where lines or curves intersect).

  - name: Trial and Error
    description: You test possible values until you find the correct one.
